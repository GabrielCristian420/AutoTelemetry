# Docker Compose for AutoTelemetry (local development).
#
# Brings up:
#   - postgres  : system of record (Flyway-migrated)
#   - zookeeper : Kafka coordination
#   - kafka     : event stream for decoupled telemetry ingestion (Week 6)
#
# The Spring Boot app itself runs from the IDE / ./mvnw (it is NOT containerised
# here, to keep the hot-reload dev loop simple). It connects to these services
# via localhost.

services:
  postgres:
    image: postgres:16
    container_name: autotelemetry-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-autotelemetry}
      POSTGRES_USER: ${DB_USERNAME:-autotelemetry}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-autotelemetry}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-autotelemetry} -d ${DB_NAME:-autotelemetry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: autotelemetry-zk
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: autotelemetry-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
