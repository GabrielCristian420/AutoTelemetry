spring:
  application:
    name: auto-telemetry

  # ---------- Database ----------
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/autotelemetry}
    username: ${DB_USERNAME:autotelemetry}
    password: ${DB_PASSWORD:autotelemetry}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false   # anti-pattern in production; keep it off
    hibernate:
      ddl-auto: validate  # Flyway owns the schema; Hibernate only checks it matches
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  # ---------- Kafka (Week 6: decouple ingestion from downstream processing) ----------
  # Bootstrap servers can be overridden via KAFKA_BOOTSTRAP_SERVERS (Railway/Render).
  # The consumer listener auto-starts but does NOT fail the app if the broker is
  # unreachable at startup; it retries in the background (non-blocking ingestion).
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Best-effort delivery: don't block the HTTP response on broker acks.
        acks: 1
    consumer:
      group-id: autotelemetry-live
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.gabrielbicu.telemetry.dto

# ---------- Server ----------
server:
  port: 8080

# ---------- App logging ----------
logging:
  level:
    com.gabrielbicu.telemetry: INFO
    org.hibernate.SQL: DEBUG
