spring:
  application:
    name: auto-telemetry

  # ---------- Database ----------
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/autotelemetry}
    username: ${DB_USERNAME:autotelemetry}
    password: ${DB_PASSWORD:autotelemetry}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false   # anti-pattern in production; keep it off
    hibernate:
      ddl-auto: validate  # Flyway owns the schema; Hibernate only checks it matches
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

# ---------- Server ----------
server:
  port: 8080

# ---------- App logging ----------
logging:
  level:
    com.gabrielbicu.telemetry: INFO
    org.hibernate.SQL: DEBUG
